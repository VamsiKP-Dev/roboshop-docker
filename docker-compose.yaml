name: roboshop
services:
  mongodb:
    build: ./mongodb
    image: joindevops/mongodb:v1  # docker build -t joindevops/mongodb:v1
    container_name: mongodb # docker run -d --network roboshop joindevops/mongodb:v1
  catalogue:
    build: ./catalogue
    image: joindevops/caralogue:v1
    container_name: catalogue
    depends_on:
    - mongodb
  frontend:
    build: ./frontend
    image: joindevops/frontend:v2
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
    - catalogue
networks:
  default: # This means all the services in this file use this network
    name: roboshop
    driver: bridge
    external: false # If true it should be created manually. If false docker creates this network
